name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: pigna
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            cd /opt/filament-finder

            # Pull latest code (il vecchio processo continua a rispondere)
            git fetch origin master
            git reset --hard origin/master

            cd web

            # Installa dipendenze e builda (PM2 resta attivo durante la build)
            npm ci
            npm run build

            # Copia static files e public per standalone mode
            cp -r .next/static .next/standalone/.next/static
            cp -r public .next/standalone/public

            # Copia .env.local nella dir standalone (Next.js lo cerca lì)
            cp .env.local .next/standalone/.env.local 2>/dev/null || true

            # Zero-downtime reload: PM2 avvia nuovo processo, poi chiude il vecchio
            pm2 describe filament-finder > /dev/null 2>&1 \
              && pm2 reload ecosystem.config.js --update-env \
              || pm2 start ecosystem.config.js

            pm2 save

            # Verifica
            sleep 3
            pm2 status filament-finder
