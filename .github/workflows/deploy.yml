name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: pigna
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            cd /opt/filament-finder

            # Pull latest code
            git fetch origin master
            git reset --hard origin/master

            cd web

            # Stop PM2 prima della build
            pm2 stop filament-finder 2>/dev/null || true

            # Installa dipendenze e builda
            npm ci
            npm run build

            # Copia static files per standalone mode
            cp -r .next/static .next/standalone/.next/static

            # Copia .env.local nella dir standalone (Next.js lo cerca lì)
            cp .env.local .next/standalone/.env.local 2>/dev/null || true

            # Avvia/riavvia PM2 via ecosystem.config.js (ha le env vars corrette)
            pm2 describe filament-finder > /dev/null 2>&1 \
              && pm2 restart ecosystem.config.js --update-env \
              || pm2 start ecosystem.config.js

            pm2 save

            # Verifica
            sleep 3
            pm2 status filament-finder
